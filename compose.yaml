services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: finproof_agent
      POSTGRES_USER: finproof
      POSTGRES_PASSWORD: finproof
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finproof -d finproof_agent"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - finproof-postgres-data:/var/lib/postgresql/data

volumes:
  finproof-postgres-data:
