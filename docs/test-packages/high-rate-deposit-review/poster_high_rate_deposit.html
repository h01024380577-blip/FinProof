<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>JB 슈퍼씨드 적금 홍보 시안</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f3f7fb;
        color: #102033;
      }
      main {
        width: 720px;
        min-height: 920px;
        margin: 0 auto;
        padding: 56px;
        box-sizing: border-box;
        background: #ffffff;
        border: 1px solid #c8d6e4;
      }
      .eyebrow {
        font-size: 18px;
        font-weight: 700;
        color: #1d4f87;
      }
      h1 {
        margin: 24px 0 18px;
        font-size: 58px;
        line-height: 1.05;
        letter-spacing: 0;
      }
      .rate {
        margin: 24px 0;
        font-size: 72px;
        font-weight: 900;
        color: #b42318;
      }
      .copy {
        font-size: 26px;
        line-height: 1.45;
      }
      .notice {
        margin-top: 56px;
        padding-top: 18px;
        border-top: 1px solid #d5dde6;
        font-size: 15px;
        line-height: 1.55;
        color: #4a5565;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">광주은행 모바일 전용</div>
      <h1>누구나 받을 수 있는<br />최고 연 5.0% 적금</h1>
      <div class="rate">연 5.0%</div>
      <p class="copy">
        JB 슈퍼씨드 적금 신규 가입 고객에게 선착순 특별 우대금리를 제공합니다.
        지금 가입하면 목돈 마련의 시작을 더 크게 만들 수 있습니다.
      </p>
      <p class="notice">
        기본금리 연 2.0%에 우대 조건 충족 시 최고 연 5.0%가 적용됩니다.
        우대 조건, 한도, 가입 기간, 중도해지 이율 및 세전/세후 수익률은 상품설명서를 확인해 주세요.
        예금자보호법에 따라 원금과 이자를 합하여 1인당 최고 5천만원까지 보호됩니다.
      </p>
    </main>
  </body>
</html>
