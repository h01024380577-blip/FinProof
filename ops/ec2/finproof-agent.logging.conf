# systemd drop-in for finproof-agent.service
# Installs to: /etc/systemd/system/finproof-agent.service.d/logging.conf
# Redirects stdout/stderr to a file that the CloudWatch Agent tails.
# NOTE: with append:, stdout no longer flows to journald — use the file
# (or CloudWatch) instead of `journalctl` for app stdout after this change.
[Service]
StandardOutput=append:/var/log/finproof/app.log
StandardError=append:/var/log/finproof/app.log
