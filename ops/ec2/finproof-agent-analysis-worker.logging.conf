# systemd drop-in for finproof-agent-analysis-worker.service
# Installs to: /etc/systemd/system/finproof-agent-analysis-worker.service.d/logging.conf
# Redirects stdout/stderr to a file that the CloudWatch Agent tails.
# NOTE: with append:, stdout no longer flows to journald — use the file
# (or CloudWatch) instead of `journalctl` for worker stdout after this change.
[Service]
StandardOutput=append:/var/log/finproof/analysis-worker.log
StandardError=append:/var/log/finproof/analysis-worker.log
