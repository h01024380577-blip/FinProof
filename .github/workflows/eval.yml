name: eval

# main으로 향하는 PR이 올라올 때 자동 실행
on:
  pull_request:
    branches: [main]
  workflow_dispatch:   # 깃허브 UI에서 수동 실행도 가능

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install pydantic

      - name: 평가 실행 (결정론적 지표만, API 키 불필요)
        working-directory: finproof-eval
        run: |
          python -m harness.runner \
            --pairs datasets/pairs.example.jsonl \
            --out report.json
        # 안전 모드: 점수가 나빠도 PR을 막지 않는다. 결과는 로그/아티팩트로만 노출.
        continue-on-error: true

      - name: 리포트 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: finproof-eval/report.json
