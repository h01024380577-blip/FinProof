name: Deploy EC2

on:
  workflow_dispatch:
  push:
    tags:
      - deploy-*

permissions:
  contents: read

concurrency:
  group: finproof-ec2-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Verify release
        run: |
          npm ci
          npm run db:generate
          npm run test
          npm run lint
          npm run build

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/finproof_agent
          chmod 600 ~/.ssh/finproof_agent

      - name: Trust EC2 host
        env:
          EC2_HOST: ${{ secrets.EC2_HOST || '52.78.86.72' }}
        run: ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Sync release to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST || '52.78.86.72' }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_APP_DIR: ${{ vars.EC2_APP_DIR || '/opt/finproof-agent/current' }}
        run: |
          users=()
          if [ -n "$EC2_USER" ]; then
            users+=("$EC2_USER")
          fi
          users+=("ec2-user" "ubuntu")

          for user in "${users[@]}"; do
            echo "Trying EC2 sync as $user@$EC2_HOST"
            if rsync -az --delete \
              --exclude='.git' \
              --exclude='.github' \
              --exclude='node_modules' \
              --exclude='.next' \
              --exclude='.env' \
              --exclude='security' \
              --exclude='.finproof-uploads' \
              -e "ssh -i ~/.ssh/finproof_agent" \
              ./ "$user@$EC2_HOST:$EC2_APP_DIR/"; then
              echo "EC2_DEPLOY_USER=$user" >> "$GITHUB_ENV"
              exit 0
            fi
          done

          echo "Unable to sync release to EC2 with configured or default users." >&2
          exit 1

      - name: Run EC2 deploy script
        env:
          EC2_HOST: ${{ secrets.EC2_HOST || '52.78.86.72' }}
          EC2_APP_DIR: ${{ vars.EC2_APP_DIR || '/opt/finproof-agent/current' }}
        run: |
          ssh -i ~/.ssh/finproof_agent "$EC2_DEPLOY_USER@$EC2_HOST" \
            "cd '$EC2_APP_DIR' && bash ops/ec2/deploy.sh"
