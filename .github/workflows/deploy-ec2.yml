name: Deploy EC2

on:
  workflow_dispatch:
  push:
    tags:
      - deploy-*

permissions:
  contents: read

concurrency:
  group: finproof-ec2-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Verify release
        run: |
          npm ci
          npm run db:generate
          npm run test
          npm run lint
          npm run build

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/finproof_agent
          chmod 600 ~/.ssh/finproof_agent

      - name: Trust EC2 host
        run: ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync release to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_APP_DIR: ${{ vars.EC2_APP_DIR || '/opt/finproof-agent/current' }}
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.env' \
            --exclude='security' \
            -e "ssh -i ~/.ssh/finproof_agent" \
            ./ "$EC2_USER@$EC2_HOST:$EC2_APP_DIR/"

      - name: Run EC2 deploy script
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_APP_DIR: ${{ vars.EC2_APP_DIR || '/opt/finproof-agent/current' }}
        run: |
          ssh -i ~/.ssh/finproof_agent "$EC2_USER@$EC2_HOST" \
            "cd '$EC2_APP_DIR' && bash ops/ec2/deploy.sh"
